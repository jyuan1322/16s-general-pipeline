# Configuration file for 16S processing pipeline
# Lines starting with # are comments and will be ignored
# Copy this file, fill in real paths, and keep your real copy out of git
# (e.g. add it to .gitignore as config_local.ini)

# ---------------- 16S data processing (process_16s.R) ----------------

# Path to directory containing raw fastq files
data_path = "<path_to_project>/data/raw_fastq/"

# Patterns to match forward and reverse read files
pattern_forward = "_R1_001.fastq.gz"
pattern_reverse = "_R2_001.fastq.gz"

sample_list =
# sample_list=TWs66,TWs67,TWs70
# optional; if omitted or blank, all samples matching pattern_forward/pattern_reverse are processed

# Output directories
data_output_dir = "<path_to_project>/data_output"
figure_output_dir = "<path_to_project>/figure_output"

# Taxonomy database
taxonomy_db = "<path_to_project>/database/silva_nr99_v138.2_toGenus_trainset.fa.gz"
taxonomy_db_species = "<path_to_project>/database/silva_v138.2_assignSpecies.fa.gz"

# Processing parameters
dada2_mode=big_data
# options: "big_data" (streamed, low memory) or "pooled" (joint distribution, high memory)

truncLen_f = 151  # Forward read truncation length
truncLen_r = 151  # Reverse read truncation length
maxN = 0  # Maximum number of Ns allowed in a read
# maxEE kept at 1
# https://www.microbiologyresearch.org/content/journal/jmm/10.1099/jmm.0.001756
# https://www.nature.com/articles/s41467-025-57591-2
maxEE = 1  # Maximum expected error rate
# truncQ increased from 2 to 11 (more stringent)
# https://www.nature.com/articles/s41467-025-57591-2
truncQ = 11  # Truncation quality score

# ---------------- Downstream analysis (fig2_asv_heatmap.R, dada2_additional_figures.R) ----------------

# Path to sample metadata CSV (must contain a sample_id column matching
# sample names produced by process_16s.R, plus any grouping columns like
# "treatment" referenced in your study_params file)
metadata_path = "<path_to_project>/metadata/metadata.csv"

# Path to per-study R script defining sample order, treatment groups,
# comparisons, plot colors, and QC thresholds.
# See study_params_template.R for the expected variables.
study_params = "<path_to_project>/study_params.R"